	<script>
		// inner

		// Менюш
		const sidebar = document.getElementById('sidebar');
		const overlay = document.getElementById('overlay');

		function toggleMenu() {
			const isOpen = sidebar.classList.contains('open');
			if (!isOpen) {
				sidebar.classList.add('open');
				document.body.classList.add('menu-open');
				overlay.classList.add('active');
				sidebar.classList.add('animating');
			} else {
				sidebar.classList.remove('open');
				document.body.classList.remove('menu-open');
				overlay.classList.remove('active');
			}
		}

		const navLinks = document.querySelectorAll('.nav-link');
		navLinks.forEach(link => {
			link.style.cursor = 'pointer';
			link.addEventListener('click', (e) => {
				if (link.getAttribute('href') === '#') {
					e.preventDefault(); // gundone
				}

				if (window.innerWidth <= 1024) {
					toggleMenu();
				}
			});
		});
		
		sidebar.addEventListener('animationend', (e) => {
			if (e.animationName === 'scan') {
				sidebar.classList.remove('animating');
			}
		});

		// фича под esc, это мне уже нейросеть подарила
		document.addEventListener('keydown', (e) => {
			if (e.key === 'Escape' && sidebar.classList.contains('open')) {
				toggleMenu();
		}});
		
		function fontsize() {
			let parent = document.querySelector('.main-content');
			let text = document.querySelector('.main-content h1');
			let w = parent.offsetWidth;
  			text.style.fontSize = w/8 + "px";
		}
		
		window.onload = fontsize;
		window.onresize = fontsize;
		window.addEventListener('load', function () {
			setTimeout(() => {
				document.querySelector('.loadPatch').classList.add('done');
				const bashka = document.querySelector('.oldLoader');
				bashka.classList.add('done');
				// Этот черт перехватывает href
				setTimeout(()=>bashka.remove(),1000);
			}, 1000);
		});
	</script>
